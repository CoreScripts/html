<!DOCTYPE html>
<html>
<head>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #game { width: 100%; height: 100%; display: block; }
        #loader { position: fixed; inset: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; transition: opacity 0.4s; }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 48px; height: 48px; border: 5px solid #333; border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader p { color: #aaa; font-family: Arial, sans-serif; font-size: 14px; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading game...</p>
    </div>
    <div id="game"></div>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game");
            container.appendChild(player);
            player.style.width = "100%";
            player.style.height = "100vh";
            player.load({
                url: "https://cdn.jsdelivr.net/gh/CoreScripts/html@main/dinorun.swf",
                autoplay: "on",
                unmuteOverlay: "hidden",
            });
            player.addEventListener("loadeddata", () => {
                const loader = document.getElementById('loader');
                loader.classList.add('hidden');
                setTimeout(() => loader.style.display = 'none', 400);
            });
            // fallback hide loader after 8 seconds
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.classList.add('hidden');
                setTimeout(() => loader.style.display = 'none', 400);
            }, 8000);
        });
    </script>
</body>
</html>
