<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        /* Removes all margins and scrollbars */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
        }

        /* Forces the container to fill the entire viewport */
        #ruffle-container {
            width: 100vw;
            height: 100vh;
        }

        /* Forces the player element to match the container */
        ruffle-player {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div id="ruffle-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("ruffle-container").appendChild(player);

            player.config = {
                "quality": "high",
                "letterbox": "on",     /* Keeps aspect ratio correct with black bars */
                "scale": "showAll",    /* Ensures no part of the game is cut off */
                "forceScale": true,
                "allowScriptAccess": "always",
                "base": "https://www.pixeljam.com/dinorun/",
                "pageUrl": "https://www.pixeljam.com/dinorun/index2.html"
            };

            // Using v=4 to bypass any existing cache
            player.load("https://cdn.jsdelivr.net/gh/CoreScripts/html@main/dinorun.swf?v=4");
        });
    </script>
</body>
</html>
