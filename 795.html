<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Dino Run: Enter Planet D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; }
        html, body { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #000; display: flex; justify-content: center; align-items: center; 
        }
        
        #game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #ruffle-container {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #mobile-ui {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 999;
            pointer-events: none; 
        }

        .btn-group { display: flex; gap: 15px; pointer-events: auto; }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px; /* Increased for arrows */
            font-family: sans-serif;
            touch-action: none;
        }

        .ctrl-btn:active { background: rgba(255, 255, 255, 0.6); transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="ruffle-container"></div>
        
        <div id="mobile-ui">
            <div class="btn-group">
                <div class="ctrl-btn" id="btn-a">←</div>
                <div class="ctrl-btn" id="btn-d">→</div>
            </div>
            <div class="btn-group">
                <div class="ctrl-btn" id="btn-s">↓</div>
                <div class="ctrl-btn" id="btn-w">↑</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        let player;

        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            document.getElementById("ruffle-container").appendChild(player);

            player.config = {
                "quality": "low",
                "letterbox": "on",
                "allowScriptAccess": "always",
                "base": "https://www.pixeljam.com/dinorun/",
                "pageUrl": "https://www.pixeljam.com/dinorun/index2.html"
            };

            // Using v=2 to keep using your working version
            player.load("https://cdn.jsdelivr.net/gh/CoreScripts/html@main/dinorun.swf?v=2");

            const keyMap = {
                "btn-a": { key: "a", code: "KeyA", keyCode: 65 },
                "btn-d": { key: "d", code: "KeyD", keyCode: 68 },
                "btn-w": { key: "w", code: "KeyW", keyCode: 87 },
                "btn-s": { key: "s", code: "KeyS", keyCode: 83 }
            };

            function triggerKey(data, type) {
                const event = new KeyboardEvent(type, {
                    key: data.key,
                    code: data.code,
                    keyCode: data.keyCode,
                    which: data.keyCode,
                    bubbles: true,
                    cancelable: true
                });
                player.dispatchEvent(event);
            }

            Object.keys(keyMap).forEach(id => {
                const btn = document.getElementById(id);
                const data = keyMap[id];

                btn.addEventListener("touchstart", (e) => { e.preventDefault(); triggerKey(data, "keydown"); });
                btn.addEventListener("touchend", (e) => { e.preventDefault(); triggerKey(data, "keyup"); });
                btn.addEventListener("mousedown", (e) => { triggerKey(data, "keydown"); });
                btn.addEventListener("mouseup", (e) => { triggerKey(data, "keyup"); });
            });
        });
    </script>
</body>
</html>
